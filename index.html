<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NTSR Miner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 5 წამიანი შესავალი - image_2.png */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; animation: hideSplash 0.5s ease 5s forwards; }
        #splash img { width: 80%; max-width: 300px; }
        @keyframes hideSplash { to { opacity: 0; visibility: hidden; } }

        /* წარწერები და ბალანსი - ნათელი ფერები */
        h1 { color: #fff; font-size: 20px; margin-bottom: 10px; }
        #balance { font-size: 40px; color: #00ff00; text-shadow: 0 0 15px #00ff00; margin-bottom: 30px; }
        
        /* დოლარის ღილაკი */
        #coin-btn { background: none; border: none; padding: 0; cursor: pointer; }
        #coin-img { width: 150px; height: 150px; border-radius: 50%; filter: drop-shadow(0 0 15px #ffd700); transition: transform 0.2s; }
        .spin { animation: spin 0.8s linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash">
        <img src="image_2.png" alt="Logo">
    </div>

    <h1>NTSR Balance</h1>
    <div id="balance">0 NTSR</div>
    
    <button id="coin-btn" onclick="mine()">
        <img id="coin-img" src="https://upload.wikimedia.org/wikipedia/commons/4/45/US_one_dollar_bill%2C_obverse.jpg" alt="Mine">
    </button>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = parseInt(localStorage.getItem('ntsr_balance')) || 0;
        document.getElementById('balance').innerText = balance + ' NTSR';

        function mine() {
            let img = document.getElementById('coin-img');
            img.classList.add('spin');
            balance++;
            document.getElementById('balance').innerText = balance + ' NTSR';
            localStorage.setItem('ntsr_balance', balance);
            setTimeout(() => { img.classList.remove('spin'); }, 800);
        }
    </script>
</body>
</html>
