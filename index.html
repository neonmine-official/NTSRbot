<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NTSR Miner</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: Arial; }
        #balance { font-size: 24px; color: #d8b4fe; }
    </style>
</head>
<body>
    <h1>NTSR Miner</h1>
    <div id="balance">0 NTSR</div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 0;
        let balDisplay = document.getElementById('balance');
        tg.CloudStorage.getItem('ntsr_balance', (err, val) => {
            if (val) { balance = parseInt(val); balDisplay.innerText = balance + ' NTSR'; }
        });
    </script>
</body>
</html>
