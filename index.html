<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeonMine Pro</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* დასაწყისის ეკრანი (Loading/Welcome) - ფონად logo.png */
        #start-screen {logo.png}
            height: 100vh;
            background: url('logo.png') no-repeat center center;
            background-size: 150%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: logo.png;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
        }
        #start-screen h1 { margin-top: 200px; font-size: 32px; text-shadow: 0 0 10px rgba(0, 255, 255, 0.8); }
        #start-screen p { font-size: 16px; opacity: 0.8; }
        #start-button {
            margin-top: 50px;
            padding: 15px 40px;
            font-size: 22px;
            cursor: pointer;
            border-radius: 30px;
            border: 2px solid #00ffff;
            background: transparent;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        #start-button:hover { background: #00ffff; color: #000; box-shadow: 0 0 25px rgba(0, 255, 255, 0.8); }

        /* თამაშის ეკრანი - მთავარ ფონად logo.png.jpg */
        #game-screen {logo.png.jpg}
            height: 100vh;
            background: url('logo.png.jpg') no-repeat center center;
            background-size: cover;
            display: none; /* თავიდან დამალულია */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: logo.png.jpg;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 5;
        }
        #score-container {
            position: absolute;
            top: 50px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid #333;
        }
        #score { font-size: 48px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        #score-label { font-size: 18px; opacity: 0.7; text-transform: uppercase; }

        /* თამაშის რგოლი (Coin) - წრიული, შიგნით logo.png.jpg */
        #game-coin {
            width: 250px;
            height: 250px;
            cursor: pointer;
            border-radius: 150%; /* სრულიად წრიული */
            background: url('logo.png') no-repeat center center;
            background-size: 70%; /* გადიდებულია, რომ ცენტრი გამოჩნდეს */
            border: 5px solid #00ffff; /* ნეონის ცისფერი ჩარჩო */
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.9), inset 0 0 20px rgba(0, 255, 255, 0.5);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            margin-top: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-coin:active { transform: scale(0.95); box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); }
        
        /* ვიზუალური ეფექტი ქოინზე (შიდა ციმციმი) */
        #game-coin::after {
            content: '';
            position: absolute;
            width: 90%;
            height: 90%;
            border-radius: 100%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            70% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <!-- დასაწყისის ეკრანი (Load/Welcome) -->
    <div id="start-screen">
        <h1>NEONMINE PRO NTSR_COINS</h1>
        </h1>logo.png</h1>
        <p>მზად ხართ მაინინგისთვის?</p>
        <button id="start-button" onclick="enterGame()">დაწყება</button>
    </div>

    <!-- თამაშის ეკრანი -->
    <div id="game-screen">
        <div id="score-container">
            <span id="score">0</span><br>
            <span id="score-label">NTSR</span>
        </div>
        <!-- აქ არის წრიული ქოინი, რომლის ფონადაც logo.png.jpg გამოიყენება -->
        <div id="game-coin" onclick="incrementScore()"></div>
        <p style="margin-top: 20px; color: #00ffff; text-shadow: 0 0 5px #00ffff;">დააჭირეთ ნეონ-რგოლს</p>
    </div>

    <script>
        let score = 0;
        const scoreElement = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');

        function enterGame() {
            startScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
        }

        function incrementScore() {
            score++;
            scoreElement.innerText = score;
            // დამატებითი ანიმაცია JS-ით (სურვილისამებრ)
            const coin = document.getElementById('game-coin');
            coin.style.boxShadow = '0 0 10px rgba(0, 255, 255, 0.5)';
            setTimeout(() => {
                coin.style.boxShadow = '0 0 30px rgba(0, 255, 255, 0.9), inset 0 0 20px rgba(0, 255, 255, 0.5)';
            }, 50);
        }
    </script>
</body>
</html>
