<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NTSR Miner</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: Arial; margin: 0; }
        
        /* 5 წამიანი შესავალი ეკრანი */
        #splash { position: fixed; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; animation: fadeOut 1s ease 5s forwards; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        
        #balance { font-size: 30px; color: #d8b4fe; margin: 20px; }
        
        /* ტრიალა დოლარი */
        #coin { width: 100px; cursor: pointer; transition: transform 0.5s; }
        .spin { animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash">
        <img src="7680fd0b-be00-4593-bcb3-cffc1f714a94.jpg" style="width: 200px;">
    </div>

    <h1>NTSR Miner</h1>
    <div id="balance">0 NTSR</div>
    
    <!-- აქ ჩაასვი დოლარის სურათი ან გამოიყენე ემოჯი -->
    <img id="coin" src="https://upload.wikimedia.org/wikipedia/commons/4/45/US_one_dollar_bill%2C_obverse.jpg" alt="Click to Mine">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 0;
        let coin = document.getElementById('coin');
        let balDisplay = document.getElementById('balance');

        coin.onclick = () => {
            coin.classList.add('spin'); // ტრიალის დაწყება
            balance++;
            balDisplay.innerText = balance + ' NTSR';
            
            // 1 წამში შეაჩერე ტრიალი
            setTimeout(() => { coin.classList.remove('spin'); }, 1000);
            
            tg.CloudStorage.setItem('ntsr_balance', balance.toString());
        };
    </script>
</body>
</html>
