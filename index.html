<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NTSR Miner</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: Arial; }
        #ntsr-logo { width: 250px; margin: 50px auto; cursor: pointer; }
        #balance { font-size: 24px; color: #d8b4fe; }
    </style>
</head>
<body>
    <h1>NTSR Miner</h1>
    <div id="balance">0 NTSR</div>
    <img id="ntsr-logo" src="7680fd0b-be00-4593-bcb3-cffc1f714a94.jpg" alt="NTSR Miner Logo">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 0;
        let logo = document.getElementById('ntsr-logo');
        let balDisplay = document.getElementById('balance');

        tg.CloudStorage.getItem('ntsr_balance', (err, val) => {
            if (val) { balance = parseInt(val); balDisplay.innerText = balance + ' NTSR'; }
        });

        logo.onclick = () => {
            balance++;
            balDisplay.innerText = balance + ' NTSR';
            tg.CloudStorage.setItem('ntsr_balance', balance.toString());
        };
    </script>
</body>
</html>
