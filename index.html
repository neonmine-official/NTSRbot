<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTSR Mining</title>
    <style>
        body { margin: 0; background: #0f0f1a; color: white; font-family: Arial; text-align: center; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        #splash { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 24px; color: #8A2BE2; }
        .logo { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(to bottom, #7FFF00, #8A2BE2); margin: 20px; cursor: pointer; }
        .btn { padding: 10px 20px; background: #8A2BE2; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ფაზა 1: Splash -->
    <div id="splash">Neonmine Pro - Loading...</div>

    <!-- ფაზა 2: მთავარი გვერდი -->
    <div id="main-page" class="page">
        <h1>NTSR Mining</h1>
        <div class="logo" onclick="tapCoin()"></div> <!-- მექანიკური -->
        <div class="logo" onclick="startAuto()"></div> <!-- ავტომატური -->
        <button class="btn" onclick="buyBooster()">ბუსტერი (3 ვარსკვლავი)</button>
        <p>ბალანსი: <span id="balance">0</span> NTSR</p>
        <button class="btn" onclick="showPage('account-page')">ჩემი ანგარიში</button>
    </div>

    <!-- ფაზა 3: ანგარიში -->
    <div id="account-page" class="page">
        <h1>ანგარიში</h1>
        <p>შენი ქოინები: <span id="balance-acc">0</span> NTSR</p>
        <button class="btn" onclick="showPage('main-page')">უკან</button>
    </div>

<script>
    let balance = parseFloat(localStorage.getItem('ntsr_balance')) || 0;
    let boosterActive = false;

    // მონაცემების შენახვა
    function save() { localStorage.setItem('ntsr_balance', balance); updateUI(); }
    
    function updateUI() {
        document.getElementById('balance').innerText = balance.toFixed(2);
        document.getElementById('balance-acc').innerText = balance.toFixed(2);
    }

    function tapCoin() {
        balance += boosterActive ? 2 : 1;
        save();
    }

    function startAuto() {
        alert("ავტომატური მაინინგი დაიწყო! დაბრუნდი 2 საათში.");
        setTimeout(() => {
            balance += boosterActive ? 20 : 10;
            save();
            alert("2 საათი გავიდა! ქოინები დაგერიცხა.");
        }, 7200000); // 2 საათი
    }

    function buyBooster() {
        if (balance >= 3) {
            balance -= 3;
            boosterActive = true;
            setTimeout(() => { boosterActive = false; }, 86400000); // 24 საათი
            save();
        } else { alert("არასაკმარისი ვარსკვლავი!"); }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Splash-ის ლოგიკა
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        showPage('main-page');
        updateUI();
    }, 5000);
</script>
</body>
</html>
